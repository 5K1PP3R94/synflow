<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynFlow V7.1 Modular</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="login-screen" class="login-shell">
    <div class="login-card">
      <img src="/logo.png" alt="SynFlow" class="login-logo">
      <p class="login-subtitle">Workflow für Hol- & Bringservice, Serviceberatung und Fahrzeugaufbereitung</p>
      <div class="field">
        <label>Benutzername</label>
        <input id="login-username" type="text" autocomplete="username">
      </div>
      <div class="field">
        <label>Passwort</label>
        <input id="login-password" type="password" autocomplete="current-password">
      </div>
      <button id="login-button" class="btn btn-primary">Anmelden</button>
      <div class="demo-box">
        <strong>Demo:</strong> admin/admin123 · dispo/demo123 · anna/demo123 · clean/demo123
      </div>
      <div id="login-error" class="error hidden"></div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand-wrap">
        <img src="/logo.png" alt="SynFlow" class="brand-logo">
        <div>
          <div class="brand-subtitle">Modularer Fahrzeugworkflow</div>
          <div class="brand-helper">Dispo → Service → Reinigung → zurück zur Dispo</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-chip">
          <span id="me-name">–</span>
          <small id="me-role">–</small>
        </div>
        <button id="logout-button" class="btn">Abmelden</button>
      </div>
    </header>

    <nav id="nav" class="nav"></nav>

    <main id="main" class="main"></main>
  </div>

  <div id="modal-root"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
