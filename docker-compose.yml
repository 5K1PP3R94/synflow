version: '3.8'

services:
  synflow-app:
    build: .
    container_name: synflow-v7-1-2
    restart: unless-stopped
    ports:
      - "3007:3000"
    volumes:
      - synflow-v7-1-2-data:/data
    environment:
      - PORT=3000
      - DB_PATH=/data/synflow.db
      - JWT_SECRET=BITTE_AENDERN_SICHERER_SCHLUESSEL_2026
      - NODE_ENV=production
    networks:
      - default
      - npm_default

volumes:
  synflow-v7-1-2-data:
    driver: local

networks:
  npm_default:
    external: true
